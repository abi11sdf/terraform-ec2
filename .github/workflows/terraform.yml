name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.9.5
  AWS_REGION: us-east-1
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  # Optional: if network state is not at network/terraform.tfstate, set this secret to the S3 key (e.g. envs/network.tfstate).
  TF_NETWORK_STATE_KEY: ${{ secrets.TF_NETWORK_STATE_KEY }}

jobs:
  terraform-plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [network, dev, qa]
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require TF_STATE_BUCKET secret
        run: test -n "${TF_STATE_BUCKET}"
        shell: bash

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-terraform-${{ matrix.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform init (S3 partial backend)
        run: |
          case "${{ matrix.environment }}" in
            network) STATE_KEY="network/terraform.tfstate" ;;
            dev)     STATE_KEY="dev/terraform.tfstate" ;;
            qa)      STATE_KEY="qa/terraform.tfstate" ;;
            *)       echo "unknown env"; exit 1 ;;
          esac
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"
        shell: bash

      - name: Assert network state exists in S3 (dev/qa)
        if: matrix.environment != 'network'
        run: |
          NET_KEY="${TF_NETWORK_STATE_KEY:-network/terraform.tfstate}"
          echo "Expecting network remote state at s3://${TF_STATE_BUCKET}/${NET_KEY}"
          if ! aws s3api head-object --bucket "${TF_STATE_BUCKET}" --key "${NET_KEY}" >/dev/null 2>&1; then
            echo "::error::No Terraform state for the network stack at s3://${TF_STATE_BUCKET}/${NET_KEY}."
            echo "Apply network once so remote state exists, then re-run this workflow."
            echo "Example (after init with the same backend bucket/key): cd environments/network && terraform apply"
            exit 1
          fi
        shell: bash

      - name: Write ci.auto.tfvars (dev/qa)
        if: matrix.environment != 'network'
        run: |
          {
            printf 'terraform_state_bucket = "%s"\n' "${TF_STATE_BUCKET}"
            if [ -n "${TF_NETWORK_STATE_KEY}" ]; then
              printf 'network_state_key = "%s"\n' "${TF_NETWORK_STATE_KEY}"
            fi
          } > ci.auto.tfvars
        shell: bash

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -no-color -input=false

      - name: Remove ci.auto.tfvars
        if: always() && matrix.environment != 'network'
        run: rm -f ci.auto.tfvars
        shell: bash
