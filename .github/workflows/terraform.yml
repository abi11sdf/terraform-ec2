name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.9.5
  AWS_REGION: us-east-1
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  # Repository secret: exact S3 bucket *name* (not arn:... or s3://)
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

jobs:
  terraform-plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [network, dev, qa]
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require TF_STATE_BUCKET secret
        run: test -n "${TF_STATE_BUCKET}"
        shell: bash

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-terraform-${{ matrix.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform init (S3 partial backend)
        run: |
          case "${{ matrix.environment }}" in
            network) STATE_KEY="network/terraform.tfstate" ;;
            dev)     STATE_KEY="dev/terraform.tfstate" ;;
            qa)      STATE_KEY="qa/terraform.tfstate" ;;
            *)       echo "unknown env"; exit 1 ;;
          esac
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"
        shell: bash

      - name: Terraform validate
        run: |
          if [ "${{ matrix.environment }}" = "network" ]; then
            terraform validate -no-color
          else
            terraform validate -no-color -var="terraform_state_bucket=${TF_STATE_BUCKET}"
          fi
        shell: bash

      - name: Terraform plan
        run: |
          if [ "${{ matrix.environment }}" = "network" ]; then
            terraform plan -no-color -input=false
          else
            terraform plan -no-color -input=false -var="terraform_state_bucket=${TF_STATE_BUCKET}"
          fi
        shell: bash
